<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N1 每日打卡</title>
<style>
/* ========== CSS Reset & Variables ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0EB;--card-bg:#FFFFFF;--text:#2C3E50;--text-secondary:#6B7B8D;
  --accent:#C0392B;--accent-light:#E74C3C;--success:#27AE60;--success-light:#2ECC71;
  --border:#E0D6CC;--shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 4px 24px rgba(0,0,0,0.10);
  --radius:12px;--radius-sm:8px;--transition:0.25s cubic-bezier(0.4,0,0.2,1);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  --phase1:#3498DB;--phase2:#E67E22;--phase3:#E74C3C;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding-bottom:40px}

/* ========== Header ========== */
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:20px 16px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.header-inner{max-width:720px;margin:0 auto}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header h1{font-size:1.4rem;font-weight:700;letter-spacing:0.5px}
.header-date{font-size:0.9rem;opacity:0.9}
.header-streak{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:20px;font-size:0.85rem;font-weight:600}
.header-streak.fire{animation:pulse-fire 0.6s ease}
@keyframes pulse-fire{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.phase-bar{display:flex;align-items:center;gap:10px;margin-top:10px;background:rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px}
.phase-dot{width:10px;height:10px;border-radius:50%;background:var(--phase1);flex-shrink:0}
.phase-info{flex:1}
.phase-label{font-size:0.75rem;opacity:0.7;text-transform:uppercase;letter-spacing:1px}
.phase-name{font-size:0.95rem;font-weight:600}
.phase-day{font-size:0.8rem;opacity:0.85}

/* ========== Main ========== */
.main{max-width:720px;margin:0 auto;padding:16px}

/* ========== Cards ========== */
.card{background:var(--card-bg);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border);transition:var(--transition)}
.card-header{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border)}
.card-header .icon{font-size:1.3rem}

/* ========== Task List ========== */
.task-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-sm);background:#FAF8F5;border:1px solid transparent;cursor:pointer;transition:var(--transition);user-select:none}
.task-item:hover{background:#F0EDE8;border-color:var(--border)}
.task-item.expanded{background:#FFF;border-color:var(--accent);box-shadow:var(--shadow)}
.task-checkbox{width:26px;height:26px;border-radius:50%;border:2px solid #CCC;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.task-checkbox.checked{background:var(--success);border-color:var(--success);animation:check-pop 0.4s cubic-bezier(0.18,0.89,0.32,1.28)}
.task-checkbox.checked::after{content:'✓';color:#fff;font-size:0.85rem;font-weight:700}
@keyframes check-pop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
.task-label{flex:1;font-size:0.95rem;font-weight:500}
.task-count{font-size:0.8rem;color:var(--text-secondary)}
.task-arrow{color:#CCC;font-size:0.8rem;transition:var(--transition)}
.task-item.expanded .task-arrow{transform:rotate(90deg);color:var(--accent)}
.task-detail{display:none;padding:12px 16px 16px 54px;border-top:1px solid var(--border)}
.task-detail.show{display:block}

/* ========== Word & Grammar Cards ========== */
.word-card,.grammar-card{display:flex;gap:12px;padding:12px;margin-bottom:8px;border-radius:var(--radius-sm);background:#FAF8F5;border-left:3px solid var(--accent);transition:var(--transition)}
.word-card:hover,.grammar-card:hover{background:#FFF7F0}
.word-card .idx,.grammar-card .idx{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0}
.word-body,.grammar-body{flex:1;min-width:0}
.word-main{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.word-kanji{font-size:1.1rem;font-weight:700}
.word-reading{font-size:0.9rem;color:var(--accent)}
.word-meaning{font-size:0.85rem;color:var(--text-secondary);margin-top:2px}
.word-example{font-size:0.8rem;color:#888;margin-top:4px;font-style:italic}
.word-pos{font-size:0.7rem;background:#E8E0D8;padding:2px 8px;border-radius:10px;color:#666}
.grammar-pattern{font-size:1.05rem;font-weight:700;color:var(--accent)}
.grammar-meaning{font-size:0.9rem;color:var(--text-secondary)}
.grammar-explanation{font-size:0.8rem;color:#888;margin-top:2px}
.grammar-example{font-size:0.8rem;color:#666;margin-top:4px;font-style:italic}
.grammar-usage{font-size:0.7rem;background:#E8E0D8;padding:2px 8px;border-radius:10px;color:#666;display:inline-block;margin-top:4px}

/* ========== Progress ========== */
.progress-section{margin-bottom:14px}
.progress-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.85rem}
.progress-label .val{font-weight:600;color:var(--accent)}
.progress-bar{height:10px;background:#E8E0D8;border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent-light),var(--accent));transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}

/* ========== Quiz ========== */
.quiz-start{text-align:center;padding:20px 0}
.quiz-info{font-size:0.85rem;color:var(--text-secondary);margin:8px 0 16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border:none;border-radius:25px;font-size:1rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:var(--font);text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light);transform:translateY(-2px);box-shadow:0 4px 16px rgba(231,76,60,0.3)}
.btn-secondary{background:#fff;color:var(--accent);border:2px solid var(--accent)}
.btn-secondary:hover{background:#FFF5F5}
.btn-small{padding:8px 16px;font-size:0.85rem;border-radius:20px}
.btn-listen{background:#8E44AD;color:#fff}
.btn-listen:hover{background:#9B59B6;transform:translateY(-2px);box-shadow:0 4px 16px rgba(142,68,173,0.3)}

.quiz-question{padding:0}
.quiz-q-num{font-size:0.8rem;color:var(--accent);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.quiz-q-text{font-size:1.15rem;font-weight:600;margin-bottom:4px}
.quiz-q-hint{font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-option{padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:0.95rem;background:#FAF8F5;text-align:left;font-family:var(--font)}
.quiz-option:hover{border-color:var(--accent-light);background:#FFF7F0}
.quiz-option.selected{border-color:var(--accent);background:#FFF0ED;font-weight:600}
.quiz-option.correct{border-color:var(--success);background:#E8F8F0}
.quiz-option.wrong{border-color:var(--accent-light);background:#FFE8E5}
.quiz-option:disabled{cursor:default;opacity:0.85}
.quiz-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:1rem;font-family:var(--font);transition:var(--transition);background:#FAF8F5}
.quiz-input:focus{outline:none;border-color:var(--accent);background:#FFF}
.quiz-feedback{margin-top:12px;padding:12px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:0.9rem}
.quiz-feedback.correct{background:#E8F8F0;color:#1E8449}
.quiz-feedback.wrong{background:#FFE8E5;color:#C0392B}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.quiz-progress-dots{display:flex;gap:6px}
.quiz-dot{width:10px;height:10px;border-radius:50%;background:#DDD;transition:var(--transition)}
.quiz-dot.active{background:var(--accent);transform:scale(1.3)}
.quiz-dot.correct-dot{background:var(--success)}
.quiz-dot.wrong-dot{background:var(--accent-light)}
.quiz-result{text-align:center;padding:20px 0}
.quiz-score{font-size:3rem;font-weight:800;color:var(--accent);margin:12px 0}
.quiz-score.perfect{color:var(--success)}
.quiz-score.good{color:#E67E22}
.quiz-score.bad{color:var(--accent-light)}
.quiz-result-detail{font-size:0.9rem;color:var(--text-secondary);margin-bottom:16px}
.quiz-encouragement{font-size:1rem;font-weight:600;margin-bottom:16px}

/* ========== Listening ========== */
.listen-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:#FAF8F5;cursor:pointer;transition:var(--transition);margin-bottom:8px;border:1px solid transparent}
.listen-card:hover{background:#FFF7F0;border-color:var(--border)}
.listen-play{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;cursor:pointer;transition:var(--transition);border:none}
.listen-play:hover{background:var(--accent-light);transform:scale(1.1)}
.listen-play.playing{background:var(--success);animation:pulse-play 1s infinite}
@keyframes pulse-play{0%,100%{box-shadow:0 0 0 0 rgba(39,174,96,0.4)}50%{box-shadow:0 0 0 12px rgba(39,174,96,0)}}
.listen-body{flex:1;min-width:0}
.listen-word{font-size:1.05rem;font-weight:600}
.listen-detail{font-size:0.8rem;color:var(--text-secondary)}
.listen-dictation{margin-top:12px}
.listen-dictation .quiz-input{margin-top:8px}
.listen-reveal{font-size:0.85rem;color:var(--text-secondary);margin-top:6px;display:none}
.listen-reveal.show{display:block}

/* ========== Management ========== */
.mgmt-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#FFF;border-radius:var(--radius);padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h3{margin-bottom:16px}
.modal .form-group{margin-bottom:14px}
.modal label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:4px;color:var(--text-secondary)}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.95rem;font-family:var(--font);transition:var(--transition)}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:80px}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ========== Celebration ========== */
.celebration{position:fixed;inset:0;pointer-events:none;z-index:300;display:none}
.celebration.show{display:block}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confetti-fall 1.5s ease-out forwards}
@keyframes confetti-fall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ========== Tabs ========== */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab{padding:10px 18px;border:none;background:none;font-size:0.9rem;font-weight:600;cursor:pointer;color:var(--text-secondary);transition:var(--transition);font-family:var(--font);position:relative;bottom:-2px;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ========== Badges ========== */
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.7rem;font-weight:700;letter-spacing:0.5px}
.badge-n2{background:#3498DB;color:#fff}
.badge-n1{background:#E74C3C;color:#fff}
.level-filter{display:flex;gap:8px;margin-bottom:12px}
.lvl-btn{padding:6px 16px;border-radius:16px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.8rem;font-weight:600;font-family:var(--font);transition:var(--transition)}
.lvl-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ========== Responsive ========== */
@media(max-width:480px){
  .header{padding:16px 12px 20px}.header h1{font-size:1.2rem}
  .main{padding:12px}.card{padding:16px;margin-bottom:12px}
  .task-item{padding:10px 12px}.word-card,.grammar-card{padding:10px}
  .btn{padding:10px 20px;font-size:0.9rem}.modal{padding:16px}
}

/* Utility */
.text-center{text-align:center}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.hidden{display:none!important}
.countdown-highlight{font-size:1.8rem;font-weight:800;color:var(--accent);text-align:center;padding:16px 0}
</style>
</head>

  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>🎌 JLPT 每日打卡</h1>

// ==================== 数据层 ====================
const STORAGE_KEY = 'jlpt_n1_data';

function defaultState() {
  return {
    version: 2,
    startDate: '2026-07-04',
    streak: 0,
    longestStreak: 0,
    lastCompletedDate: null,
    progress: {},
    learnedVocab: [],
    learnedGrammar: [],
    vocabMastery: {},
    grammarMastery: {},
    customVocab: [],
    customGrammar: [],
    quizHistory: [],
    settings: {}
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const state = JSON.parse(raw);
    // merge missing keys from default
    const def = defaultState();
    for (const k of Object.keys(def)) {
      if (!(k in state)) state[k] = def[k];
    }
    return state;
  } catch(e) {
    return defaultState();
  }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ==================== 合并词汇/语法池 ====================
function getAllVocab(state) {
  return [...BUILTIN_VOCAB, ...state.customVocab];
}

function getAllGrammar(state) {
  return [...BUILTIN_GRAMMAR, ...state.customGrammar];
}

// ==================== 日程引擎 ====================
function getTodayDate() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function daysBetween(d1, d2) {
  const a = new Date(d1), b = new Date(d2);
  return Math.floor((b - a) / (1000*60*60*24));
}

function getDailyPlan(state) {
  const today = getTodayDate();
  const dayNum = daysBetween(state.startDate, today) + 1;

  let phase, phaseName, phaseLabel, vocabTotal, grammarTotal, questions;
  if (dayNum <= 88) {
    phase = 1;
    phaseName = '集中学習期';
    phaseLabel = 'PHASE 1';
    vocabTotal = 18;
    grammarTotal = 3;
    questions = 10;
  } else if (dayNum <= 133) {
    phase = 2;
    phaseName = '復習強化期';
    phaseLabel = 'PHASE 2';
    vocabTotal = 12;
    grammarTotal = 2;
    questions = 12;
  } else if (dayNum <= 154) {
    phase = 3;
    phaseName = '総仕上げ期';
    phaseLabel = 'PHASE 3';
    vocabTotal = 8;
    grammarTotal = 2;
    questions = 15;
  } else {
    phase = 4;
    phaseName = '試験直前';
    phaseLabel = 'FINAL';
    vocabTotal = 5;
    grammarTotal = 1;
    questions = 20;
  }

  return { phase, phaseName, phaseLabel, dayNum, vocabTotal, grammarTotal, questions, today };
}

// ==================== 每日学习内容 ====================
function getDailyVocab(state, count, dayNum) {
  const all = getAllVocab(state);
  const learned = new Set(state.learnedVocab);
  const unseen = all.filter((_, i) => !learned.has(i));
  const seen = all.filter((_, i) => learned.has(i));

  // Phase 1: 78% new, Phase 2: 42% new, Phase 3: 25% new
  let newRatio;
  if (dayNum <= 88) newRatio = 0.78;
  else if (dayNum <= 133) newRatio = 0.42;
  else newRatio = 0.25;

  let newCount = Math.floor(count * newRatio);
  let reviewCount = count - newCount;

  const chosen = [];
  // Pick new words
  const shuffledNew = [...unseen].sort(() => Math.random() - 0.5);
  chosen.push(...shuffledNew.slice(0, newCount));

  // Pick review words (prioritize low mastery)
  if (chosen.length < count) {
    const mastery = state.vocabMastery;
    const reviewPool = seen.filter(v => {
      const m = mastery[v[0]];
      return m !== undefined && m < 5;
    }).sort((a, b) => {
      const ma = (mastery[a[0]] || 0);
      const mb = (mastery[b[0]] || 0);
      return ma - mb;
    });
    const remaining = count - chosen.length;
    chosen.push(...reviewPool.slice(0, remaining));
  }

  // If still not enough, add more unseen
  if (chosen.length < count) {
    const remaining = count - chosen.length;
    chosen.push(...shuffledNew.slice(newCount, newCount + remaining));
  }

  // Shuffle final deck
  return chosen.sort(() => Math.random() - 0.5);
}

function getDailyGrammar(state, count, dayNum) {
  const all = getAllGrammar(state);
  const learned = new Set(state.learnedGrammar);
  const unseen = all.filter((_, i) => !learned.has(i));
  const seen = all.filter((_, i) => learned.has(i));

  let newCount = Math.min(count, unseen.length);
  let reviewCount = count - newCount;

  const chosen = [...unseen.sort(() => Math.random() - 0.5).slice(0, newCount)];

  if (chosen.length < count) {
    const reviewPool = seen.sort(() => Math.random() - 0.5);
    chosen.push(...reviewPool.slice(0, count - chosen.length));
  }

  return chosen.sort(() => Math.random() - 0.5);
}

// ==================== 今日进度 ====================
function getTodayProgress(state) {
  const today = getTodayDate();
  if (!state.progress[today]) {
    state.progress[today] = {
      vocabCompleted: false,
      grammarCompleted: false,
      questionsCompleted: false,
      quizCompleted: false,
      quizScore: 0,
      quizAnswers: []
    };
  }
  return state.progress[today];
}

// ==================== 打卡逻辑 ====================
function checkStreak(state) {
  const today = getTodayDate();
  const progress = getTodayProgress(state);

  if (state.lastCompletedDate) {
    const daysSince = daysBetween(state.lastCompletedDate, today);
    if (daysSince === 1) {
      // consecutive!
    } else if (daysSince === 0 && state.streak > 0) {
      return; // already counted today
    } else {
      state.streak = 0;
    }
  }

  const allDone = progress.vocabCompleted && progress.grammarCompleted &&
                  progress.questionsCompleted && progress.quizCompleted;
  if (allDone && state.lastCompletedDate !== today) {
    if (state.lastCompletedDate && daysBetween(state.lastCompletedDate, today) === 1) {
      state.streak++;
    } else if (!state.lastCompletedDate || daysBetween(state.lastCompletedDate, today) > 1) {
      state.streak = 1;
    }
    state.lastCompletedDate = today;
    if (state.streak > state.longestStreak) state.longestStreak = state.streak;
  }
}

function updateStreakFromProgress(state) {
  // Recalculate streak from progress history
  const today = getTodayDate();
  const dates = Object.keys(state.progress)
    .filter(d => {
      const p = state.progress[d];
      return p.vocabCompleted && p.grammarCompleted &&
             p.questionsCompleted && p.quizCompleted;
    })
    .sort();

  if (dates.length === 0) { state.streak = 0; state.lastCompletedDate = null; return; }

  let streak = 1;
  let lastDate = dates[dates.length-1];

  if (lastDate !== today && lastDate !== getDateBefore(today, 1)) {
    streak = 0;
  }

  for (let i = dates.length-2; i >= 0; i--) {
    const expected = getDateBefore(lastDate, 1);
    if (dates[i] === expected) {
      streak++;
      lastDate = dates[i];
    } else {
      break;
    }
  }

  state.streak = streak;
  state.lastCompletedDate = dates[dates.length-1];
  if (streak > state.longestStreak) state.longestStreak = streak;
}

function getDateBefore(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() - n);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

// ==================== 测试引擎 (10题) ====================
function generateQuiz(state, count = 10) {
  const allVocab = getAllVocab(state);
  const allGrammar = getAllGrammar(state);
  const learnedV = state.learnedVocab;
  const learnedG = state.learnedGrammar;

  // Pool: learned items (or all if not enough learned)
  let vocabPool = learnedV.length >= 20
    ? learnedV.map(i => allVocab[i]).filter(Boolean)
    : allVocab;
  let grammarPool = learnedG.length >= 15
    ? learnedG.map(i => allGrammar[i]).filter(Boolean)
    : allGrammar;

  const questions = [];

  // Question type distribution for 10 questions
  const types = [
    { type: 'reading', weight: 3, pool: vocabPool },      // 读音选择
    { type: 'meaning', weight: 3, pool: vocabPool },       // 释义选择
    { type: 'fill', weight: 2, pool: vocabPool },          // 填空
    { type: 'grammar', weight: 2, pool: grammarPool }      // 语法选择
  ];

  const typeList = [];
  types.forEach(t => {
    for (let i = 0; i < t.weight; i++) typeList.push(t);
  });

  // Shuffle type order
  typeList.sort(() => Math.random() - 0.5);

  const usedItems = new Set();

  for (let i = 0; i < Math.min(count, typeList.length); i++) {
    const t = typeList[i];
    const available = t.pool.filter(item => !usedItems.has(item[0]));
    if (available.length < 4) {
      // Not enough items, reuse
      usedItems.clear();
    }
    const targetPool = available.length >= 4 ? available : t.pool;
    const target = targetPool[Math.floor(Math.random() * targetPool.length)];
    usedItems.add(target[0]);

    const q = buildQuestion(target, t.type, targetPool, allVocab, allGrammar, i);
    if (q) questions.push(q);
  }

  return questions;
}

function buildQuestion(target, type, pool, allVocab, allGrammar, index) {
  let distractors;
  const q = { type, target, index };

  if (type === 'reading') {
    // Q: 给出汉字 → 选读音 (4选1)
    q.prompt = `「${target[1]}」の読み方は？`;
    q.hint = `${target[2]}（${target[3]}）`;
    distractors = genDistractors(target, pool, 'reading', 3);
    q.options = shuffle([target[2], ...distractors]);
    q.answer = target[2];
    q.answerIdx = q.options.indexOf(q.answer);

  } else if (type === 'meaning') {
    // Q: 给出词/读音 → 选释义 (4选1)
    q.prompt = `「${target[1]}（${target[2]}）」の意味は？`;
    q.hint = `${target[3]}`;
    distractors = genDistractors(target, pool, 'meaning', 3);
    q.options = shuffle([target[3], ...distractors]);
    q.answer = target[3];
    q.answerIdx = q.options.indexOf(q.answer);

  } else if (type === 'fill') {
    // Q: 给出假名 → 填汉字 (或反)
    if (Math.random() > 0.5) {
      q.prompt = `読み方「${target[2]}」の漢字は？`;
      q.hint = `意味: ${target[3]}`;
      q.answer = target[1];
      q.inputType = 'kanji';
    } else {
      q.prompt = `「${target[1]}」の読み方をひらがなで書いてください`;
      q.hint = `意味: ${target[3]}`;
      q.answer = target[2];
      q.inputType = 'kana';
    }
    q.options = null;

  } else if (type === 'grammar') {
    // Q: 给出语法 → 选含义 (4选1)
    q.prompt = `次の文法の意味として正しいものを選びなさい:\n「${target[1]}」`;
    q.hint = `例: ${target[4]}`;
    distractors = genGrammarDistractors(target, allGrammar, 3);
    q.options = shuffle([target[2], ...distractors]);
    q.answer = target[2];
    q.answerIdx = q.options.indexOf(q.answer);
  }

  return q;
}

function genDistractors(target, pool, field, count) {
  const candidates = pool
    .filter(v => v[0] !== target[0])
    .map(v => v[field === 'reading' ? 2 : 3])
    .filter(Boolean);
  const unique = [...new Set(candidates)];
  return unique.sort(() => Math.random() - 0.5).slice(0, count);
}

function genGrammarDistractors(target, pool, count) {
  const candidates = pool
    .filter(g => g[0] !== target[0])
    .map(g => g[2])
    .filter(Boolean);
  const unique = [...new Set(candidates)];
  return unique.sort(() => Math.random() - 0.5).slice(0, count);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ==================== 听力练习模块 ====================
function speakJapanese(text, callback) {
  if (!window.speechSynthesis) return;

  // Cancel any ongoing speech
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ja-JP';
  utterance.rate = 0.85;
  utterance.pitch = 1;

  // Try to find a Japanese voice
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));
  if (jaVoice) utterance.voice = jaVoice;

  if (callback) {
    utterance.onend = callback;
    utterance.onerror = () => callback();
  }

  window.speechSynthesis.speak(utterance);
}

function getListeningWords(state, count = 10) {
  const allVocab = getAllVocab(state);
  const learned = state.learnedVocab;
  const pool = learned.length >= 10
    ? learned.map(i => allVocab[i]).filter(Boolean)
    : allVocab;
  return pool.sort(() => Math.random() - 0.5).slice(0, count);
}

function calcPct(val, total) {
  if (total === 0) return 0;
  return Math.min(100, Math.round((val / total) * 100));
}

// ==================== 交互处理 ====================
function toggleTask(type, el) {
  const detail = document.getElementById('detail-' + type);
  const isOpen = detail.classList.contains('show');

  // Close all
  document.querySelectorAll('.task-detail').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.task-item').forEach(t => t.classList.remove('expanded'));

  if (!isOpen) {
    detail.classList.add('show');
    el.classList.add('expanded');
  }
}

function markTaskDone(type) {
  const state = loadState();
  const progress = getTodayProgress(state);
  const key = type === 'vocab' ? 'vocabCompleted' :
             type === 'grammar' ? 'grammarCompleted' :
             type === 'questions' ? 'questionsCompleted' :
             'quizCompleted';

  progress[key] = true;

  // Record learned items
  if (type === 'vocab' && window._dailyVocab) {
    const all = getAllVocab(state);
    window._dailyVocab.forEach(v => {
      const idx = all.findIndex(a => a[0] === v[0]);
      if (idx >= 0 && !state.learnedVocab.includes(idx)) {
        state.learnedVocab.push(idx);
      }
      // Update mastery
      if (!state.vocabMastery[v[0]]) state.vocabMastery[v[0]] = 0;
      state.vocabMastery[v[0]] = Math.min(5, (state.vocabMastery[v[0]] || 0) + 1);
    });
  }

  if (type === 'grammar' && window._dailyGrammar) {
    const all = getAllGrammar(state);
    window._dailyGrammar.forEach(g => {
      const idx = all.findIndex(a => a[0] === g[0]);
      if (idx >= 0 && !state.learnedGrammar.includes(idx)) {
        state.learnedGrammar.push(idx);
      }
      if (!state.grammarMastery[g[0]]) state.grammarMastery[g[0]] = 0;
      state.grammarMastery[g[0]] = Math.min(5, (state.grammarMastery[g[0]] || 0) + 1);
    });
  }

  saveState(state);

  // UI update
  document.getElementById('check-' + type).classList.add('checked');
  const detail = document.getElementById('detail-' + type);
  detail.classList.remove('show');

  // Check if all done
  checkAllDone(state);
}

function checkAllDone(state) {
  const progress = getTodayProgress(state);
  if (progress.vocabCompleted && progress.grammarCompleted &&
      progress.questionsCompleted && progress.quizCompleted &&
      state.lastCompletedDate !== getTodayDate()) {
    state.streak++;
    state.lastCompletedDate = getTodayDate();
    if (state.streak > state.longestStreak) state.longestStreak = state.streak;
    saveState(state);
    celebrate();
  }
  renderApp(state);
}

// ==================== Quiz Logic ====================
let currentQuiz = null;
let currentQIndex = 0;
let quizAnswers = [];

function startQuiz() {
  currentQuiz = window._quizQuestions;
  currentQIndex = 0;
  quizAnswers = [];
  renderQuizQuestion();
  document.getElementById('quizStart').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
}

function retakeQuiz() {
  const state = loadState();
  const progress = getTodayProgress(state);
  progress.quizCompleted = false;
  progress.quizScore = 0;
  progress.quizAnswers = [];
  saveState(state);

  window._quizQuestions = generateQuiz(state, 10);
  currentQuiz = window._quizQuestions;
  currentQIndex = 0;
  quizAnswers = [];
  renderApp(state);

  // Auto-start
  setTimeout(() => {
    document.getElementById('quizStart').classList.add('hidden');
    document.getElementById('quizArea').classList.remove('hidden');
    renderQuizQuestion();
  }, 100);
}

function renderQuizQuestion() {
  if (!currentQuiz || currentQIndex >= currentQuiz.length) {
    finishQuiz();
    return;
  }

  const q = currentQuiz[currentQIndex];
  const area = document.getElementById('quizArea');

  let dotsHTML = '';
  for (let i = 0; i < currentQuiz.length; i++) {
    let dotClass = 'quiz-dot';
    if (i === currentQIndex) dotClass += ' active';
    if (quizAnswers[i] !== undefined) {
      dotClass += quizAnswers[i].correct ? ' correct-dot' : ' wrong-dot';
    }
    dotsHTML += `<div class="${dotClass}"></div>`;
  }

  let answerHTML = '';

  if (q.options) {
    // Multiple choice
    const labels = ['A', 'B', 'C', 'D'];
    answerHTML = `
      <div class="quiz-options">
        ${q.options.map((opt, i) => {
          let cls = 'quiz-option';
          if (quizAnswers[currentQIndex] !== undefined) {
            if (i === q.answerIdx) cls += ' correct';
            else if (i === quizAnswers[currentQIndex].selected && !quizAnswers[currentQIndex].correct) cls += ' wrong';
            cls += ''; // disabled by quiz state
          }
          return `<button class="${cls}" ${quizAnswers[currentQIndex] !== undefined ? 'disabled' : ''}
            onclick="selectAnswer(${currentQIndex}, ${i})">
            ${labels[i]}. ${opt}
          </button>`;
        }).join('')}
      </div>
    `;
  } else {
    // Fill in the blank
    answerHTML = `
      <input class="quiz-input" id="fillInput" placeholder="答えを入力してください"
        ${quizAnswers[currentQIndex] !== undefined ? 'disabled' : ''}
        onkeydown="if(event.key==='Enter')checkFillAnswer(${currentQIndex})">
      ${quizAnswers[currentQIndex] === undefined ? '<button class="btn btn-small btn-primary mt-8" onclick="checkFillAnswer(' + currentQIndex + ')">確認</button>' : ''}
    `;
  }

  // Feedback
  let feedbackHTML = '';
  if (quizAnswers[currentQIndex] !== undefined) {
    const a = quizAnswers[currentQIndex];
    feedbackHTML = `
      <div class="quiz-feedback ${a.correct ? 'correct' : 'wrong'}">
        ${a.correct ? '✅ 正解！' : '❌ 不正解'}
        ${!a.correct ? `<br>正解: <strong>${q.answer}</strong>` : ''}
        ${q.type === 'grammar' ? `<br><small>${q.target[3]}</small>` : ''}
      </div>
    `;
  }

  area.innerHTML = `
    <div class="quiz-question">
      <div class="quiz-q-num">問題 ${currentQIndex + 1} / ${currentQuiz.length} · ${q.type === 'reading' ? '読解選択' : q.type === 'meaning' ? '意味選択' : q.type === 'fill' ? '穴埋め' : '文法選択'}</div>
      <div class="quiz-q-text">${q.prompt}</div>
      <div class="quiz-q-hint">${q.hint}</div>
      ${answerHTML}
      ${feedbackHTML}
    </div>
    <div class="quiz-nav">
      <button class="btn btn-small btn-secondary" ${currentQIndex === 0 ? 'disabled' : ''}
        onclick="prevQuestion()">◀ 前へ</button>
      <div class="quiz-progress-dots">${dotsHTML}</div>
      <button class="btn btn-small ${quizAnswers[currentQIndex] !== undefined ? 'btn-primary' : 'btn-secondary'}"
        ${currentQIndex >= currentQuiz.length - 1 ? 'style="opacity:0.5"' : ''}
        onclick="nextQuestion()">次へ ▶</button>
    </div>
  `;
}

function selectAnswer(qIdx, optIdx) {
  if (quizAnswers[qIdx] !== undefined) return; // Already answered

  const q = currentQuiz[qIdx];
  const correct = optIdx === q.answerIdx;
  quizAnswers[qIdx] = { selected: optIdx, correct, question: q.prompt };
  renderQuizQuestion();
}

function checkFillAnswer(qIdx) {
  if (quizAnswers[qIdx] !== undefined) return;

  const input = document.getElementById('fillInput');
  if (!input) return;
  const userAnswer = normalizeText(input.value);
  const q = currentQuiz[qIdx];
  const correctAnswer = normalizeText(q.answer);

  // Allow various correct forms
  const correct = userAnswer === correctAnswer ||
    userAnswer === normalizeText(q.target[1]) ||
    userAnswer === normalizeText(q.target[2]);

  quizAnswers[qIdx] = { selected: -1, correct, question: q.prompt, userAnswer: input.value };
  renderQuizQuestion();
}

function normalizeText(text) {
  if (!text) return '';
  // Convert half-width to full-width for kana
  return text
    .replace(/[｡-ﾟ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0xfee0))
    .replace(/[A-Za-z]/g, c => String.fromCharCode(c.charCodeAt(0) + 0xfee0))
    .trim()
    .toLowerCase();
}

function prevQuestion() {
  if (currentQIndex > 0) {
    currentQIndex--;
    renderQuizQuestion();
  }
}

function nextQuestion() {
  if (quizAnswers[currentQIndex] === undefined) return; // Must answer first
  if (currentQIndex < currentQuiz.length - 1) {
    currentQIndex++;
    renderQuizQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  const state = loadState();
  const progress = getTodayProgress(state);
  const score = quizAnswers.filter(a => a.correct).length;

  progress.quizCompleted = true;
  progress.quizScore = score;
  progress.quizAnswers = quizAnswers;

  // Record wrong answers for review
  state.quizHistory.push({
    date: getTodayDate(),
    score,
    total: currentQuiz.length,
    answers: quizAnswers.map(a => ({ q: a.question, correct: a.correct }))
  });

  // Keep only last 60 quiz records
  if (state.quizHistory.length > 60) state.quizHistory = state.quizHistory.slice(-60);

  saveState(state);
  checkAllDone(state);
}

// ==================== Listening Logic ====================
function playWord(idx) {
  const w = window._listeningWords[idx];
  if (!w) return;

  const playBtn = document.getElementById('listen-play-' + idx);
  playBtn.classList.add('playing');
  playBtn.textContent = '🔊';

  speakJapanese(w[1], () => {
    playBtn.classList.remove('playing');
    playBtn.textContent = '▶';
  });
}

function checkDictation(idx) {
  const input = document.getElementById('listen-input-' + idx);
  const reveal = document.getElementById('listen-reveal-' + idx);
  const wordEl = document.getElementById('listen-word-' + idx);
  const w = window._listeningWords[idx];
  if (!w || !input) return;

  const answer = normalizeText(input.value);
  const correctKana = normalizeText(w[2]);
  const correctKanji = normalizeText(w[1]);

  reveal.classList.add('show');
  wordEl.textContent = (answer === correctKana || answer === correctKanji)
    ? '✅ ' + w[1] : '❌ ' + w[1];

  if (answer === correctKana || answer === correctKanji) {
    wordEl.style.color = 'var(--success)';
  } else {
    wordEl.style.color = 'var(--accent-light)';
  }
}

function readDailyVocab() {
  if (!window._dailyVocab || window._dailyVocab.length === 0) return;
  const words = window._dailyVocab.map(v => v[1] + '。' + v[2]).join('。');
  speakJapanese(words);
}

function refreshListening() {
  const state = loadState();
  window._listeningWords = getListeningWords(state, 10);
  document.getElementById('listeningSection').innerHTML = renderListeningSection(window._listeningWords);
}

function addCustomGrammar() {
  const state = loadState();
  const pattern = document.getElementById('add-pattern').value.trim();
  const meaning = document.getElementById('add-gmeaning').value.trim();
  const explanation = document.getElementById('add-explanation').value.trim();
  const example = document.getElementById('add-gexample').value.trim();
  const exampleCn = document.getElementById('add-gexampleCn').value.trim();
  const usage = document.getElementById('add-usage').value.trim();
  const level = document.getElementById('add-glevel').value;

  if (!pattern || !meaning) { alert('文型・意味は必須です'); return; }

  const newId = Math.max(0, ...getAllGrammar(state).map(g => g[0])) + 1;
  state.customGrammar.push([newId, pattern, meaning, explanation || '', example || '', exampleCn || '', usage || '', level]);

  saveState(state);
  closeModal();
  renderApp(state);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function exportData() {
  const state = loadState();
  const blob = new Blob([JSON.stringify({ state, exportDate: new Date().toISOString(), version: 2 }, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'jlpt-n1-backup-' + getTodayDate() + '.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.state && data.version) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.state));
        alert('✅ データを読み込みました。ページを更新します。');
        location.reload();
      } else {
        alert('❌ 無効なファイルです');
      }
    } catch(err) {
      alert('❌ ファイルの解析に失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ==================== 初始化 ====================
function init() {
  const state = loadState();

  // Ensure speech synthesis voices are loaded
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
  }

  // Render the app
  renderApp(state);

  // Check if today is a fresh day — reset if needed
  const today = getTodayDate();
  const progress = getTodayProgress(state);

  // Close modal on outside click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  console.log('🎌 JLPT N1 每日打卡 準備完了！');
  console.log(`📅 今日: ${today} | 🔥 連続: ${state.streak}日 | 📝 単語: ${state.learnedVocab.length}個 | 📚 文法: ${state.learnedGrammar.length}個`);
  console.log(`📊 試験まであと ${Math.max(0, Math.floor((new Date('2026-12-06') - new Date()) / (1000*60*60*24)))} 日`);
}

// Boot
document.addEventListener('DOMContentLoaded', init);
</script>
